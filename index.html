document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:100%;margin-top:18px;padding:15px;border:none;border-radius:13px;background:#fff;color:#161311;font:600 16px 'Hanken Grotesk',sans-serif;cursor:pointer;\" style-hover=\"transform:translateY(-2px)\">Book a demo to lock this in →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ INTEGRATIONS ============ -->\n<section id=\"features\" style=\"background:#fff;padding:clamp(60px,8vw,100px) clamp(18px,4vw,40px);\">\n  <div style=\"max-width:1100px;margin:0 auto;text-align:center;\">\n    <div style=\"font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#F23E7B;margin-bottom:16px;\">Plays nice with your stack<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(1.7rem,3.6vw,2.6rem);line-height:1.08;letter-spacing:-.02em;margin:0 0 40px;\">Connects to the tools you already run on.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;\">\n      <sc-for list=\"{{ integrations }}\" as=\"i\" hint-placeholder-count=\"6\">\n        <div style=\"padding:26px 16px;border-radius:16px;border:1px solid #efe9df;background:#FBF8F3;display:flex;flex-direction:column;align-items:center;gap:10px;\" style-hover=\"border-color:#e3d9cb;transform:translateY(-3px)\">\n          <div style=\"width:46px;height:46px;border-radius:12px;background:repeating-linear-gradient(135deg,#ece5da 0 6px,#f5f0e8 6px 12px);display:flex;align-items:center;justify-content:center;font-size:18px;color:#9a9184;\">{{ i.icon }}<\u002Fdiv>\n          <span style=\"font-size:14px;font-weight:600;color:#48413a;\">{{ i.name }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"font-size:13px;color:#9a9184;margin-top:24px;font-family:'Space Grotesk',monospace;letter-spacing:.04em;\">— partner logos shown as placeholders —<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TESTIMONIALS ============ -->\n<section id=\"proof\" style=\"background:#FBF8F3;padding:clamp(70px,9vw,120px) clamp(18px,4vw,40px);\">\n  <div style=\"max-width:1150px;margin:0 auto;\">\n    <div style=\"text-align:center;margin-bottom:50px;\">\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#7C5CFF;margin-bottom:16px;\">Proof from the line<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(1.9rem,4.2vw,3.1rem);line-height:1.06;letter-spacing:-.02em;margin:0;\">Sundays got their nights back.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;\">\n      <sc-for list=\"{{ testimonials }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border:1px solid #efe9df;border-radius:22px;padding:30px 28px;display:flex;flex-direction:column;\">\n          <div style=\"display:flex;gap:10px;margin-bottom:18px;\">\n            <span style=\"padding:5px 11px;border-radius:8px;background:rgba(242,62,123,.1);color:#d92e66;font-size:12px;font-weight:700;\">{{ t.before }}<\u002Fspan>\n            <span style=\"font-size:14px;color:#bdb4a7;align-self:center;\">→<\u002Fspan>\n            <span style=\"padding:5px 11px;border-radius:8px;background:rgba(31,174,107,.12);color:#15945a;font-size:12px;font-weight:700;\">{{ t.after }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:17px;line-height:1.55;color:#2a2420;margin:0 0 24px;flex:1;font-weight:500;\">\"{{ t.quote }}\"<\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:13px;\">\n            <div style=\"width:46px;height:46px;border-radius:50%;background:{{ t.avatar }};\"><\u002Fdiv>\n            <div><div style=\"font-size:15px;font-weight:700;\">{{ t.name }}<\u002Fdiv><div style=\"font-size:13px;color:#8a8276;\">{{ t.role }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PRICING ============ -->\n<section id=\"pricing\" style=\"background:#fff;padding:clamp(70px,9vw,120px) clamp(18px,4vw,40px);\">\n  <div style=\"max-width:1150px;margin:0 auto;\">\n    <div style=\"text-align:center;margin-bottom:50px;\">\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#F23E7B;margin-bottom:16px;\">Pricing<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(1.9rem,4.2vw,3.1rem);line-height:1.06;letter-spacing:-.02em;margin:0 0 14px;\">Pays for itself the first week.<\u002Fh2>\n      <p style=\"font-size:1.1rem;color:#5d564c;margin:0;\">Simple per-location pricing. No long-term contracts.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:20px;align-items:stretch;\">\n      <sc-for list=\"{{ plans }}\" as=\"p\" hint-placeholder-count=\"3\">\n        <div style=\"{{ p.cardStyle }}\">\n          <sc-if value=\"{{ p.popular }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;top:18px;right:18px;padding:5px 12px;border-radius:999px;background:linear-gradient(115deg,#FF6A3D,#7C5CFF);color:#fff;font-size:11px;font-weight:700;letter-spacing:.04em;\">MOST POPULAR<\u002Fdiv>\n          <\u002Fsc-if>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin:0 0 6px;\">{{ p.name }}<\u002Fh3>\n          <p style=\"font-size:14px;color:{{ p.subColor }};margin:0 0 20px;line-height:1.5;\">{{ p.tagline }}<\u002Fp>\n          <div style=\"display:flex;align-items:baseline;gap:6px;margin-bottom:22px;\">\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:700;line-height:1;\">{{ p.price }}<\u002Fspan>\n            <span style=\"font-size:14px;color:{{ p.subColor }};\">{{ p.per }}<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ goDemo }}\" style=\"{{ p.btnStyle }}\">{{ p.cta }}<\u002Fbutton>\n          <div style=\"height:1px;background:{{ p.line }};margin:24px 0;\"><\u002Fdiv>\n          <sc-for list=\"{{ p.features }}\" as=\"f\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:flex-start;gap:11px;padding:7px 0;\">\n              <span style=\"flex-shrink:0;width:19px;height:19px;border-radius:50%;background:{{ p.tick }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;\">✓<\u002Fspan>\n              <span style=\"font-size:14.5px;color:{{ p.featColor }};line-height:1.45;\">{{ f }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FINAL CTA ============ -->\n<section id=\"demo\" style=\"background:#15110d;padding:clamp(70px,10vw,130px) clamp(18px,4vw,40px);position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(124,92,255,.26),transparent 65%);\"><\u002Fdiv>\n  <div style=\"position:absolute;bottom:-120px;right:-60px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(255,106,61,.18),transparent 65%);\"><\u002Fdiv>\n  <div style=\"max-width:760px;margin:0 auto;text-align:center;position:relative;\">\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(2rem,5vw,3.6rem);line-height:1.05;letter-spacing:-.03em;color:#fff;margin:0 0 20px;\">Ready to stop counting inventory the old way?<\u002Fh2>\n    <p style=\"font-size:clamp(1.05rem,1.7vw,1.3rem);color:#bdb4a7;margin:0 0 36px;line-height:1.55;\">Book a 20-minute live demo. We'll scan a section of your storage on the call and show you the time you'd get back.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center;\">\n      <button onclick=\"{{ onBookForm }}\" style=\"display:inline-flex;align-items:center;gap:9px;padding:17px 34px;border:none;border-radius:14px;background:linear-gradient(115deg,#FF6A3D,#F23E7B 50%,#7C5CFF);color:#fff;font:600 18px 'Hanken Grotesk',sans-serif;cursor:pointer;box-shadow:0 18px 44px -12px rgba(124,92,255,.6);\" style-hover=\"transform:translateY(-2px)\">Book your live demo today <span style=\"font-size:19px;\">→<\u002Fspan><\u002Fbutton>\n      <button onclick=\"{{ onWatchDemo }}\" style=\"padding:17px 30px;border:1.5px solid rgba(255,255,255,.24);border-radius:14px;background:transparent;color:#fff;font:600 18px 'Hanken Grotesk',sans-serif;cursor:pointer;\" style-hover=\"border-color:#fff;background:rgba(255,255,255,.06)\">Watch the 60-sec demo<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:24px;justify-content:center;margin-top:34px;font-size:14px;color:#8a8276;\">\n      <span>✓ No clipboard required<\u002Fspan><span>✓ Live in under a week<\u002Fspan><span>✓ Cancel anytime<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer style=\"background:#0e0b08;padding:48px clamp(18px,4vw,40px);color:#8a8276;\">\n  <div style=\"max-width:1150px;margin:0 auto;display:flex;flex-wrap:wrap;gap:20px;align-items:center;justify-content:space-between;\">\n    <div style=\"display:flex;align-items:center;gap:10px;\">\n      <div style=\"width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#FF6A3D,#F23E7B 50%,#7C5CFF);display:flex;align-items:center;justify-content:center;\"><div style=\"width:10px;height:10px;background:#fff;border-radius:3px;transform:rotate(45deg);\"><\u002Fdiv><\u002Fdiv>\n      <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;color:#fff;\">AtomAgentic<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:26px;flex-wrap:wrap;font-size:14px;\">\n      <span onclick=\"{{ goHow }}\" style=\"cursor:pointer;\">How it works<\u002Fspan>\n      <span onclick=\"{{ goBenefits }}\" style=\"cursor:pointer;\">Benefits<\u002Fspan>\n      <span onclick=\"{{ goPricing }}\" style=\"cursor:pointer;\">Pricing<\u002Fspan>\n      <span onclick=\"{{ goDemo }}\" style=\"cursor:pointer;\">Book a demo<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-size:13px;\">© 2026 AtomAgentic, Inc.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ============ VIDEO MODAL ============ -->\n<sc-if value=\"{{ videoOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div onclick=\"{{ onCloseVideo }}\" style=\"position:fixed;inset:0;z-index:200;background:rgba(14,11,8,.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeUp .25s both;\">\n  <div onclick=\"{{ stopProp }}\" style=\"position:relative;width:min(900px,94vw);aspect-ratio:16/9;background:#15110d;border-radius:20px;overflow:hidden;box-shadow:0 40px 100px -30px rgba(0,0,0,.7);\">\n    <iframe src=\"https://drive.google.com/file/d/19aLUu8i4UzbfcrDj4IapFVC-jDFkvKw-/preview\" title=\"AtomAgentic product demo video\" allow=\"autoplay; encrypted-media; fullscreen; picture-in-picture\" allowfullscreen style=\"position:absolute;inset:0;width:100%;height:100%;border:0;background:#15110d;\"><\u002Fiframe>\n    <button onclick=\"{{ onCloseVideo }}\" style=\"position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;\">✕<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.state = {\n      w: (typeof window !== 'undefined' ? window.innerWidth : 1200),\n      menuOpen: false,\n      activeStep: 0,\n      activeQ: 0,\n      videoOpen: false,\n      loc: 3, hrs: 8, lab: 18, food: 45000\n    };\n  }\n\n  componentDidMount(){\n    this._onResize = () => this.setState({ w: window.innerWidth });\n    window.addEventListener('resize', this._onResize);\n    this._onKey = (e) => { if (e.key === 'Escape') this.setState({ videoOpen: false, menuOpen: false }); };\n    window.addEventListener('keydown', this._onKey);\n    this.startCounters();\n  }\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('keydown', this._onKey);\n    if (this._io) this._io.disconnect();\n  }\n\n  startCounters(){\n    const root = this.rootRef.current;\n    if (!root) return;\n    const els = root.querySelectorAll('[data-count]');\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (!en.isIntersecting) return;\n        const el = en.target;\n        if (el._done) return;\n        el._done = true;\n        const target = parseFloat(el.dataset.count);\n        const suffix = el.dataset.suffix || '';\n        const dur = 1400, t0 = performance.now();\n        const tick = (t) => {\n          const p = Math.min(1, (t - t0) / dur);\n          const e = 1 - Math.pow(1 - p, 3);\n          el.textContent = Math.round(target * e) + suffix;\n          if (p < 1) requestAnimationFrame(tick);\n        };\n        requestAnimationFrame(tick);\n        this._io.unobserve(el);\n      });\n    }, { threshold: 0.4 });\n    els.forEach((el) => this._io.observe(el));\n  }\n\n  scrollToId(id){\n    const root = this.rootRef.current;\n    if (!root) return;\n    const el = root.querySelector('#' + id);\n    if (el) window.scrollTo({ top: window.scrollY + el.getBoundingClientRect().top - 68, behavior: 'smooth' });\n    this.setState({ menuOpen: false });\n  }\n\n  renderVals(){\n    const go = (id) => () => this.scrollToId(id);\n    const w = this.state.w;\n    const isMobile = w < 860;\n\n    // ---- trust pills (built as React nodes, duplicated for marquee) ----\n    const trust = ['AI-Powered Inventory','Built for Restaurants','Coolers · Freezers · Dry Storage','Real-Time Insights','ERP / POS Ready'];\n    const pill = (t, k) => React.createElement('div', { key:k, style:{display:'flex',alignItems:'center',gap:'9px',padding:'8px 18px',borderRadius:'999px',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.09)',whiteSpace:'nowrap'} },\n      React.createElement('span', { style:{width:'6px',height:'6px',borderRadius:'50%',background:'linear-gradient(135deg,#FF6A3D,#7C5CFF)'} }),\n      React.createElement('span', { style:{fontSize:'14px',fontWeight:600,color:'#e7e1d8'} }, t));\n    const trustRow = trust.map((t,i) => pill(t,i));\n\n    // ---- pains ----\n    const pains = [\n      { icon:'📋', title:'Manual clipboard counting', desc:'Walking the line with a pen and a printout, hoping nobody skips a shelf.' },\n      { icon:'❓', title:'Numbers you can\\u2019t trust', desc:'Miscounts and typos turn into bad orders and surprise shortages.' },\n      { icon:'🗑️', title:'Food waste piling up', desc:'Product spoils in the back of the walk-in because nobody saw it.' },\n      { icon:'📦', title:'Overstocking & dead cash', desc:'Over-ordering ties up thousands in inventory you didn\\u2019t need.' },\n      { icon:'🔥', title:'Running out mid-rush', desc:'The one item you\\u2019re out of is the one everyone orders at lunch.' },\n      { icon:'🌙', title:'No real-time visibility', desc:'You don\\u2019t know what\\u2019s on the shelf until someone counts it — Sunday night.' },\n    ];\n\n    const beforeList = ['3\\u20135 hours of manual counting','Juggling multiple spreadsheets','Guesswork ordering','Late-night inventory checks','Costly, repeated mistakes'];\n    const afterList = ['Inventory counted in minutes','AI-recognized items & quantities','One real-time dashboard','Smarter, forecast-based purchasing','Tighter food-cost control'];\n\n    // ---- steps ----\n    const stepData = [\n      { n:'01', title:'Scan with your phone or tablet', desc:'Walk the line and point your camera at shelves, coolers, and freezers. No clipboard.' },\n      { n:'02', title:'AI recognizes items & quantities', desc:'AtomAgentic identifies each product and counts it in real time — cases, bottles, bags, and bins.' },\n      { n:'03', title:'Inventory updates automatically', desc:'Counts sync to your live dashboard the moment you scan. Every location, always current.' },\n      { n:'04', title:'AI recommends what to order next', desc:'Based on your covers and forecast, it drafts tomorrow\\u2019s order — ready to send to vendors.' },\n    ];\n    const steps = stepData.map((s, i) => {\n      const active = i === this.state.activeStep;\n      return {\n        ...s,\n        onClick: () => this.setState({ activeStep: i }),\n        cardStyle: {\n          padding:'18px 20px', borderRadius:'16px', cursor:'pointer', transition:'all .25s',\n          border: active ? '1.5px solid rgba(124,92,255,.9)' : '1px solid #ECE5DA',\n          background: active ? '#fff' : 'transparent',\n          boxShadow: active ? '0 18px 40px -20px rgba(124,92,255,.5)' : 'none'\n        },\n        numStyle: {\n          flexShrink:0, width:'42px', height:'42px', borderRadius:'12px',\n          display:'flex', alignItems:'center', justifyContent:'center',\n          fontFamily:\"'Space Grotesk',sans-serif\", fontSize:'16px', fontWeight:700,\n          background: active ? 'linear-gradient(135deg,#FF6A3D,#7C5CFF)' : '#F0EBE2',\n          color: active ? '#fff' : '#B0A696'\n        }\n      };\n    });\n\n    // ---- benefits ----\n    const benefits = [\n      { icon:'⏱️', bg:'rgba(124,92,255,.12)', title:'Save labor hours weekly', desc:'Cut inventory from hours to minutes and hand your team their time back.' },\n      { icon:'🌿', bg:'rgba(31,174,107,.12)', title:'Reduce food waste', desc:'See aging stock before it spoils
